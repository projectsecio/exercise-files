# Build on GitHub, rsync dist + package files to EC2, reinstall prod deps, restart systemd.
# Lives at repo root of your dashboard GitHub project (see WA101 deploy.md).

name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub is moving Actions internals off Node 20; v6 actions + Node 22 build stay current.
    # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload build to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/ec2_deploy -o StrictHostKeyChecking=accept-new"
          # Parent dir must exist on EC2 (clone repo once or mkdir). See WA101 deploy.md.
          ssh $SSH_OPTS "${USER}@${HOST}" "mkdir -p '${REMOTE_DIR}/dist'"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "${USER}@${HOST}:${REMOTE_DIR}/dist/"
          rsync -avz -e "ssh $SSH_OPTS" package.json package-lock.json "${USER}@${HOST}:${REMOTE_DIR}/"

      - name: Install prod dependencies and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            npm ci --omit=dev
            if sudo systemctl restart threat-intel-dashboard 2>/dev/null; then
              echo "Restarted systemd unit threat-intel-dashboard"
            elif sudo systemctl restart threat-intel 2>/dev/null; then
              echo "Restarted systemd unit threat-intel"
            elif command -v pm2 >/dev/null 2>&1; then
              pm2 reload all || pm2 restart all || true
            else
              echo "::warning::No known restart command — start Node manually (e.g. node dist/server/entry.mjs)."
            fi
