# Local lab stack — INSECURE-threat-intel-app (not for production)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: threat_intel
      POSTGRES_PASSWORD: threat_intel
      POSTGRES_DB: threat_intel
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threat_intel -d threat_intel"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:4321"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: threat_intel
      DB_USER: threat_intel
      DB_PASSWORD: threat_intel
      DB_SSLMODE: disable
      AUTH_USERNAME: analyst
      AUTH_PASSWORD: projectx
      AUTH_SECRET: local-insecure-dev-secret-change-me
      HOST: 0.0.0.0
      PORT: "4321"
      NODE_ENV: production

volumes:
  postgres_data:
