# Local lab reverse proxy — INSECURE-threat-intel-app (not for production)
# Fronts the Astro SSR app so you browse http://localhost:8081 without the :4321 port.

upstream app_upstream {
    server app:4321;
}

server {
    listen 80;
    server_name _;

    # Forward everything to the Astro Node server.
    location / {
        proxy_pass http://app_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR support (used by Astro dev/live features).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
